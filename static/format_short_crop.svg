<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <rect width="240" height="160" fill="#0f1117"/>
  <!-- Source wide video -->
  <rect x="8" y="28" width="130" height="74" rx="5" fill="#1e2535" stroke="#475569" stroke-width="1.5"/>
  <polygon points="58,56 58,76 78,66" fill="#475569"/>
  <text x="73" y="112" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">Original 16:9</text>
  <!-- Dashed crop box in center of source -->
  <rect x="47" y="30" width="52" height="70" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Arrow -->
  <line x1="148" y1="65" x2="162" y2="65" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  <polygon points="162,60 172,65 162,70" fill="#2563eb"/>
  <!-- Result tall video -->
  <rect x="173" y="20" width="58" height="100" rx="5" fill="#1e3562" stroke="#2563eb" stroke-width="2"/>
  <polygon points="193,58 193,78 213,68" fill="#3b82f6"/>
  <text x="202" y="132" font-family="system-ui,sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle">9:16 Short</text>
</svg>
